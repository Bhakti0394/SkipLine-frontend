<html lang="en" class="dark">

    <meta charset="UTF-8" />

    <!--
      CRITICAL: Inline style block — runs before ANY external CSS or JS.
      Paints the dark background on the very first browser frame so there
      is zero white flash between HTML parse and React mounting.
      #080706 must match PageLoader's background exactly.
    -->
    <style>
      html, body, #root {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        background-color: #080706;
        color: #f1f5f9;
      }
      body {
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
